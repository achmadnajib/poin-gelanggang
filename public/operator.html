<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Operator — Poin Gelanggang</title><link rel="stylesheet" href="/style.css"></head><body>
<section id="login" class="login-wrap"><form class="card login" id="loginForm"><div class="brand">POIN <i>GELANGGANG</i></div><p class="muted">Panel operator pertandingan pencak silat</p><label>Nama pengguna<input name="username" value="pagar nusa" required></label><br><label>Password<input name="password" type="password" autocomplete="current-password" required></label><br><button class="btn primary" style="width:100%">MASUK KE SISTEM</button><p class="muted" style="font-size:12px">Akun operator: pagar nusa</p></form></section>
<section id="app" class="hidden"><header class="topbar"><div class="brand">POIN <i>GELANGGANG</i></div><div class="row"><a class="btn red" href="/juri" target="_blank">Buka Juri</a><a class="btn blue" href="/display" target="_blank">Buka Monitor</a><span class="badge">PAGAR NUSA</span><button id="logout" class="btn ghost">Keluar</button></div></header><main class="container"><div id="listView"><div class="row spread"><div><h1 class="title">Manajemen Pertandingan</h1><p class="muted">Alur cepat: buat pertandingan → sambungkan juri → mulai.</p></div><div class="row"><button id="archiveOldBtn" class="btn ghost">Bersihkan Event Lama</button><button id="newBtn" class="btn primary">+ Pertandingan Baru</button></div></div><div class="card"><div class="row"><input id="search" placeholder="Cari nama, nomor partai, kode..." style="max-width:420px"><select id="filter" style="max-width:180px"><option value="">Semua status</option><option value="menunggu">menunggu</option><option value="berlangsung">berlangsung</option><option value="jeda">sudut netral</option><option value="selesai">selesai</option></select></div><div style="overflow:auto"><table><thead><tr><th>Partai</th><th>Pesilat</th><th>Kode</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="matches"></tbody></table></div></div></div><div id="matchView" class="hidden"></div></main></section>
<div id="newModal" class="modal hidden"><form id="newForm" class="card"><div class="row spread"><h2 class="title">Pertandingan Baru</h2><button type="button" class="btn ghost close">Tutup</button></div><br><div class="grid grid-4"><label>Nomor partai<input name="boutNumber" required></label><label>Gelanggang<input name="arena" value="1"></label><label>Kategori<input name="category" value="Tanding"></label><label>Kelas<input name="className" placeholder="Kelas A Putra"></label></div><br><div class="grid grid-2"><div><h3>Sudut Merah</h3><label>Nama<input name="redName" required></label><br><label>Kontingen<input name="redTeam"></label></div><div><h3>Sudut Biru</h3><label>Nama<input name="blueName" required></label><br><label>Kontingen<input name="blueTeam"></label></div></div><br><div class="grid grid-3"><label>Jumlah babak<input name="totalRounds" type="number" value="3" min="1" max="20"></label><label>Durasi (detik)<input name="duration" type="number" value="120" min="1" max="3600" required></label><label>Jendela validasi (detik)<input name="validationWindow" type="number" value="2" min="1" max="3"></label></div><br><button class="btn primary" style="width:100%">BUAT & HASILKAN KODE 4 DIGIT</button></form></div>
<script src="/common.js"></script><script src="/operator.js"></script></body></html>
